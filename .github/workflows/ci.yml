name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  cli:
    strategy:
      matrix:
        node: [20, 22, 24]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm audit --omit=dev
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      - run: npm run smoke:bin

  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - run: node --test scripts/*.test.mjs
      - run: node scripts/validate-skills.mjs

  plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run build:plugin
      - name: Verify the committed plugin bundle is current
        run: git diff --exit-code -- ../plugin/.claude-plugin/plugin.json ../plugin/bin/gradient.mjs
      - name: Smoke-test the bundled CLI
        run: node ../plugin/bin/gradient.mjs --version
      - name: Run the packaged dogfood release gate
        run: npm run dogfood -- --output ../artifacts/dogfood
      - name: Upload dogfood evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradient-dogfood-${{ github.sha }}
          path: artifacts/dogfood
          if-no-files-found: warn
          retention-days: 14
